<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Frigo Chef — AI-powered cooking assistant that turns the ingredients in your fridge into delicious recipes."
    />
    <meta name="theme-color" content="#0f0f1a" />
    <title>Frigo Chef — Cook with what you have</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ===================== TOP NAV ===================== -->
    <header class="nav" id="nav">
      <a href="#" class="nav__brand" data-nav="landing">
        <span class="nav__logo" aria-hidden="true">🥕</span>
        <span class="nav__name">Frigo<span class="grad-text">Chef</span></span>
      </a>

      <nav class="nav__links" id="navLinks" aria-label="Primary">
        <a href="#features" class="nav__link" data-scroll>Features</a>
        <a href="#how" class="nav__link" data-scroll>How it works</a>
        <a href="#pricing" class="nav__link" data-scroll>Pricing</a>
      </nav>

      <div class="nav__actions" id="navActions">
        <!-- Filled in by JS depending on auth state -->
      </div>

      <button class="nav__burger" id="navBurger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </header>

    <!-- ===================== APP ROOT ===================== -->
    <main id="app"></main>

    <!-- ===================== FOOTER ===================== -->
    <footer class="footer">
      <div class="footer__inner">
        <div class="footer__brand">
          <span class="nav__logo" aria-hidden="true">🥕</span>
          <span class="nav__name">Frigo<span class="grad-text">Chef</span></span>
        </div>
        <p class="footer__tag">Cook smarter with what you already have.</p>
        <p class="footer__credit">Created By Sano</p>
      </div>
    </footer>

    <!-- ===================== TOAST ===================== -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="js/store.js"></script>
    <script src="js/recipes.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/views.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
